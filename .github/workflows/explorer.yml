      # ── Step 4: Commit any discoveries ──────────────────────────────────
      - name: Commit exploration results
        run: |
          git config user.name "Explorer Agent"
          git config user.email "explorer@versailles.bot"
          git add skills/discovered/ projects/discovered/ catalog/ AGENT_NOTES.md
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No new discoveries this exploration."
          else
            SKILL_COUNT=$(git diff --staged --name-only | grep "skills/discovered" | wc -l)
            PROJECT_COUNT=$(git diff --staged --name-only | grep "projects/discovered" | wc -l)
            git commit -m "explorer: found ${SKILL_COUNT} skill(s), ${PROJECT_COUNT} project(s) [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "Exploration results committed and pushed."
          fi
